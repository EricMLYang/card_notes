schema_version: "1.0"
last_updated: "2026-03-17"

skills:
  - name: "卡片拆解"
    alias: "break-cards"
    trigger: "當需要將長文拆解成原子化卡片時"
    description: "將 005_PARA (Projects/Areas) 中的長文拆成 lite 候選卡，並交由 refine-cards 精煉"
    mode: hybrid
    estimated_effort: medium
    category: zettelkasten
    path: ".github/skills/break-cards/SKILL.md"

  - name: "正式卡精煉"
    alias: "refine-cards"
    trigger: "當 break-cards 產出 lite 候選卡後，需要精煉成正式卡草稿時"
    description: "將 lite 候選卡精煉成正式卡草稿，待 user 確認後才進行落檔、更新索引與原文改名"
    mode: hybrid
    estimated_effort: medium
    category: zettelkasten
    path: ".github/skills/refine-cards/SKILL.md"

  - name: "卡片素材搜集與連結"
    alias: "gather-cards"
    trigger: "當需要為寫作主題搜集相關卡片，或為當前卡片建立連結時"
    description: "模式 A：給定主題，搜尋 5-15 張相關卡片。模式 B：分析當前卡片，找出 3-7 張值得連結的卡片並說明理由"
    mode: autonomous
    estimated_effort: low
    category: zettelkasten
    path: ".github/skills/gather-cards/SKILL.md"

  - name: "寫作自動化主控台"
    alias: "write-pipeline"
    trigger: "當需要開始新文章寫作流程時"
    description: "串接 W0-W8 寫作環節，用 Draft frontmatter 追蹤進度，最終發佈至 015_Write/Publish"
    mode: interactive
    estimated_effort: high
    category: writing
    path: ".github/skills/write-pipeline/SKILL.md"

  - name: "草稿狀態管理"
    alias: "resume-draft"
    trigger: "當需要查看或恢復草稿寫作進度時"
    description: "列出所有進行中草稿的 pipeline 狀態，讓用戶快速恢復寫作"
    mode: autonomous
    estimated_effort: low
    category: writing
    path: ".github/skills/resume-draft/SKILL.md"

  - name: "Capture 強化與分類"
    alias: "enrich-capture"
    trigger: "當需要處理 003_Capture 中的檔案並移入 PARA 時"
    description: "為 Capture 檔案補上標頭元資料，並分類移動到 005_PARA 對應的 inbox 或 Resources"
    mode: interactive
    estimated_effort: medium
    category: research
    path: ".github/skills/enrich-capture/SKILL.md"

  - name: "智慧新聞搜集"
    alias: "scout-news"
    trigger: "當需要根據知識庫 context 搜集相關新聞時"
    description: "根據卡片、草稿、問題意識等 context，自動搜尋相關新聞，篩選後存入 003_Capture"
    mode: interactive
    estimated_effort: medium
    category: research
    path: ".github/skills/scout-news/SKILL.md"

  - name: "閱讀偏好更新"
    alias: "update-profile"
    trigger: "當需要分析喜歡的文章並更新閱讀偏好時"
    description: "分析用戶喜歡的文章，萃取閱讀偏好，更新 000_MyContext/capture_profile.md"
    mode: hybrid
    estimated_effort: low
    category: research
    path: ".github/skills/update-profile/SKILL.md"

  - name: "事實查證"
    alias: "fact-check"
    trigger: "當需要查證文章中的具體細節時"
    description: "查證文章中的具體細節、人名、引述是否真實有據"
    mode: autonomous
    estimated_effort: low
    category: content
    path: ".github/skills/fact-check/SKILL.md"

  - name: "社群媒體排版"
    alias: "format-article"
    trigger: "當需要將文章排版用於社群媒體時"
    description: "將文章進行社群媒體排版，插入空行增加可讀性"
    mode: autonomous
    estimated_effort: low
    category: content
    path: ".github/skills/format-article/SKILL.md"

  - name: "檔名前綴守門"
    alias: "filename-prefix-guard"
    trigger: "當需要檢查或修正檔名日期前綴時"
    description: "統一檢查與修正 003_Capture、015_Write/Draft、015_Write/Publish 的檔名日期前綴"
    mode: hybrid
    estimated_effort: low
    category: maintenance
    path: ".github/skills/filename-prefix-guard/SKILL.md"

  - name: "工作區統計與變更回顧"
    alias: "workspace-stats"
    trigger: "當需要查看工作區統計或最近變更時"
    description: "統計核心資料夾檔案數量，顯示最近 git 變更歷史與活躍度分析"
    mode: autonomous
    estimated_effort: low
    category: maintenance
    path: ".github/skills/workspace-stats/SKILL.md"

  - name: "Repo 健康檢查"
    alias: "repo-healthcheck"
    trigger: "當需要從 Repo 視角檢查資料夾結構與治理一致性時"
    description: "檢查橋接入口、.ai 治理層、技能索引與命名規範，輸出修復建議"
    mode: autonomous
    estimated_effort: low
    category: maintenance
    path: ".github/skills/repo-healthcheck/SKILL.md"

  - name: "Copilot 橋接同步"
    alias: "copilot-sync"
    trigger: "當需要同步 Copilot 橋接檔案時"
    description: "當 AGENTS.md 更新後，比對並同步 .github/copilot-instructions.md 的角色摘要、技能表與目錄快查"
    mode: interactive
    estimated_effort: low
    category: maintenance
    path: ".github/skills/copilot-sync/SKILL.md"

  - name: "技能擴充"
    alias: "skill-expand"
    trigger: "當需要將重複性工作流程固化成技能時"
    description: "將經常執行的任務轉換為可復用的 Skill"
    mode: interactive
    estimated_effort: medium
    category: meta
    path: ".github/skills/skill-expand/SKILL.md"

categories:
  zettelkasten: "Zettelkasten 卡片盒方法相關的核心流程"
  writing: "文章寫作流程與草稿管理"
  research: "資訊搜集與閱讀偏好研究"
  content: "內容處理、分析與格式化"
  maintenance: "系統維護與檔案管理"
  meta: "技能本身的建立與擴充"

deprecated_aliases:
  - old_alias: "process-inbox"
    replacement: "enrich-capture"
    status: "renamed"
  - old_alias: "sync-agent-instructions"
    replacement: "copilot-sync"
    status: "renamed"
  - old_alias: "create-skill"
    replacement: "skill-expand"
    status: "merged"
  - old_alias: "high-res-summary"
    replacement: ""
    status: "removed"
  - old_alias: "teardown-article"
    replacement: ""
    status: "removed"
  - old_alias: "archive-article"
    replacement: ""
    status: "removed"
